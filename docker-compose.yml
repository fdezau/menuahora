version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: menuahora_db
    environment:
      POSTGRES_USER: menuahora
      POSTGRES_PASSWORD: menuahora123
      POSTGRES_DB: menuahora
    ports:
      - "5435:5432"
    volumes:
      - menuahora_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: menuahora_redis
    ports:
      - "6381:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: menuahora_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@menuahora.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5052:80"

volumes:
  menuahora_postgres:
